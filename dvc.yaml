stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    params:
    - data_ingestion.testSplit
    - data_ingestion.dataURL
    outs:
    - data/raw
  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
    - data/raw
    - src/data_preprocessing.py
    outs:
    - data/processed
  feature_engg:
    cmd: python src/feature_engg.py
    deps:
    - data/processed
    - src/feature_engg.py
    outs:
    - data/final
  model_training:
    cmd: python src/model_training.py
    deps:
    - data/final
    - src/model_training.py
    params:
    - model_training.max_iters
    outs:
    - models/logisticregressionModel.pkl
  model_evaluation:
    cmd: python src/model_evaluation.py
    deps:
    - models/logisticregressionModel.pkl
    - src/model_evaluation.py
    metrics:
    - reports/metrics.json

